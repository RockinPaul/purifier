category = "Download"
safety = "Caution"
reason = "7-Zip archive — check if contents were extracted"

[[rules]]
pattern = "~/Downloads/*.rar"
category = "Download"
safety = "Caution"
reason = "RAR archive — check if contents were extracted"

[[rules]]
pattern = "~/Downloads/*.exe"
category = "Download"
safety = "Caution"
reason = "Windows executable — not runnable on macOS, likely safe to delete"

[[rules]]
pattern = "~/Downloads/*"
category = "Download"
safety = "Caution"
reason = "Downloaded file — review before deleting"

