# Purifier — Default Safety Rules for macOS
# Rules are evaluated top-to-bottom; first match wins.
# Patterns support globs (* and **) and ~ for home directory.

# === Build Artifacts (Safe) ===

[[rules]]
pattern = "**/node_modules"
category = "BuildArtifact"
safety = "Safe"
reason = "Regenerated by `npm install` from package.json"

[[rules]]
pattern = "**/target/debug"
category = "BuildArtifact"
safety = "Safe"
reason = "Rust debug build output — regenerated by `cargo build`"

[[rules]]
pattern = "**/target/release"
category = "BuildArtifact"
safety = "Safe"
reason = "Rust release build output — regenerated by `cargo build --release`"

[[rules]]
pattern = "**/.build"
category = "BuildArtifact"
safety = "Safe"
reason = "Swift build output — regenerated by `swift build`"

[[rules]]
pattern = "**/__pycache__"
category = "BuildArtifact"
safety = "Safe"
reason = "Python bytecode cache — regenerated automatically"

[[rules]]
pattern = "**/.tox"
category = "BuildArtifact"
safety = "Safe"
reason = "Python tox virtual environments — regenerated by `tox`"

[[rules]]
pattern = "**/build/outputs"
category = "BuildArtifact"
safety = "Safe"
reason = "Gradle/Android build outputs — regenerated by build"

[[rules]]
pattern = "**/.gradle"
category = "BuildArtifact"
safety = "Safe"
reason = "Gradle cache — regenerated automatically"

[[rules]]
pattern = "**/DerivedData"
category = "BuildArtifact"
safety = "Safe"
reason = "Xcode derived data — regenerated on build"

[[rules]]
pattern = "**/Pods"
category = "BuildArtifact"
safety = "Safe"
reason = "CocoaPods dependencies — regenerated by `pod install`"

[[rules]]
pattern = "**/.dart_tool"
category = "BuildArtifact"
safety = "Safe"
reason = "Dart/Flutter tool cache — regenerated automatically"

[[rules]]
pattern = "**/vendor/bundle"
category = "BuildArtifact"
safety = "Safe"
reason = "Ruby bundled gems — regenerated by `bundle install`"

# === Caches (Safe) ===

[[rules]]
pattern = "~/Library/Caches/*"
category = "Cache"
safety = "Safe"
reason = "Application cache — apps recreate as needed"

[[rules]]
pattern = "~/.cache/*"
category = "Cache"
safety = "Safe"
reason = "XDG cache directory — apps recreate as needed"

[[rules]]
pattern = "~/.npm/_cacache"
category = "Cache"
safety = "Safe"
reason = "npm download cache — regenerated on install"

[[rules]]
pattern = "~/.cargo/registry/cache"
category = "Cache"
safety = "Safe"
reason = "Cargo crate download cache — re-downloaded as needed"

[[rules]]
pattern = "~/Library/Logs/*"
category = "Cache"
safety = "Safe"
reason = "Application logs — safe to delete, new logs created as needed"

[[rules]]
pattern = "~/.Trash/*"
category = "Cache"
safety = "Safe"
reason = "Already in trash — safe to permanently delete"

# === Downloads (Caution) ===

[[rules]]
pattern = "~/Downloads/*.dmg"
category = "Download"
safety = "Caution"
reason = "Disk image — likely safe if app is already installed"

[[rules]]
pattern = "~/Downloads/*.pkg"
category = "Download"
safety = "Caution"
reason = "Installer package — likely safe if already installed"

[[rules]]
pattern = "~/Downloads/*.zip"
category = "Download"
safety = "Caution"
reason = "Archive — check if contents were extracted"

[[rules]]
pattern = "~/Downloads/*.tar.gz"
category = "Download"
safety = "Caution"
reason = "Archive — check if contents were extracted"

[[rules]]
pattern = "~/Downloads/*"
category = "Download"
safety = "Caution"
reason = "Downloaded file — review before deleting"

# === App Data (Unsafe) ===

[[rules]]
pattern = "~/Library/Application Support/*"
category = "AppData"
safety = "Unsafe"
reason = "App data and settings — deletion may cause data loss"

[[rules]]
pattern = "~/Library/Preferences/*"
category = "AppData"
safety = "Unsafe"
reason = "App preferences — deletion resets app settings"

[[rules]]
pattern = "~/Library/Containers/*"
category = "AppData"
safety = "Unsafe"
reason = "Sandboxed app data — deletion may cause data loss"

# === System (Unsafe) ===

[[rules]]
pattern = "**/.git/objects"
category = "System"
safety = "Unsafe"
reason = "Git object store — deletion destroys repository history"

[[rules]]
pattern = "**/.git"
category = "System"
safety = "Unsafe"
reason = "Git repository data — deletion destroys version control"

[[rules]]
pattern = "/System/**"
category = "System"
safety = "Unsafe"
reason = "macOS system files — do not delete"

[[rules]]
pattern = "/usr/**"
category = "System"
safety = "Unsafe"
reason = "System binaries and libraries — do not delete"

[[rules]]
pattern = "~/Library/Keychains/*"
category = "System"
safety = "Unsafe"
reason = "Keychain data — contains passwords and certificates"

[[rules]]
pattern = "~/Documents/*"
category = "AppData"
safety = "Unsafe"
reason = "User documents — review carefully before deleting"

[[rules]]
pattern = "~/Desktop/*"
category = "AppData"
safety = "Caution"
reason = "Desktop files — review before deleting"
