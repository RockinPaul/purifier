# Purifier — Default Safety Rules for macOS
# Rules are evaluated top-to-bottom; first match wins.
# Patterns support globs (* and **) and ~ for home directory.
#
# Categories: BuildArtifact, Cache, Download, AppData, Media, System, Unknown
# Safety levels: Safe, Caution, Unsafe
#
# ORDERING IS CRITICAL — first match wins, so more specific patterns must
# appear before broader catch-alls (e.g., browser profile rules before
# ~/Library/Application Support/* catch-all).

# ============================================================================
# 1. CREDENTIALS & SECRETS (Unsafe)
# These MUST come first so they are never shadowed by broader patterns.
# ============================================================================

[[rules]]
pattern = "~/.ssh/*"
category = "System"
safety = "Unsafe"
reason = "SSH keys and config — deletion locks you out of remote servers"

[[rules]]
pattern = "~/.gnupg/*"
category = "System"
safety = "Unsafe"
reason = "GPG keys and trust database — deletion destroys encryption identity"

[[rules]]
pattern = "~/.aws/*"
category = "System"
safety = "Unsafe"
reason = "AWS credentials and config — deletion removes cloud access"

[[rules]]
pattern = "~/.kube/*"
category = "System"
safety = "Unsafe"
reason = "Kubernetes config and credentials — deletion removes cluster access"

[[rules]]
pattern = "~/.gcloud/*"
category = "System"
safety = "Unsafe"
reason = "Google Cloud credentials — deletion removes cloud access"

[[rules]]
pattern = "~/.azure/*"
category = "System"
safety = "Unsafe"
reason = "Azure credentials and config — deletion removes cloud access"

[[rules]]
pattern = "~/.docker/config.json"
category = "System"
safety = "Unsafe"
reason = "Docker registry credentials — deletion logs you out of registries"

[[rules]]
pattern = "~/.config/*"
category = "AppData"
safety = "Unsafe"
reason = "XDG config directory — may contain app settings and credentials"

[[rules]]
pattern = "**/.env"
category = "System"
safety = "Unsafe"
reason = "Environment variables file — likely contains secrets and API keys"

[[rules]]
pattern = "**/.env.local"
category = "System"
safety = "Unsafe"
reason = "Local environment overrides — likely contains secrets"

[[rules]]
pattern = "**/.env.production"
category = "System"
safety = "Unsafe"
reason = "Production environment config — contains production secrets"

[[rules]]
pattern = "**/*.pem"
category = "System"
safety = "Unsafe"
reason = "PEM certificate or key file — may be required for TLS/auth"

[[rules]]
pattern = "**/*.key"
category = "System"
safety = "Unsafe"
reason = "Private key file — deletion may break encryption or authentication"

# ============================================================================
# 2. BROWSER & APP-SPECIFIC DATA (Unsafe)
# Must come BEFORE the ~/Library/Application Support/* catch-all.
# ============================================================================

[[rules]]
pattern = "~/Library/Application Support/Firefox/Profiles"
category = "AppData"
safety = "Unsafe"
reason = "Firefox profiles — contains bookmarks, history, saved passwords"

[[rules]]
pattern = "~/Library/Application Support/Google/Chrome"
category = "AppData"
safety = "Unsafe"
reason = "Chrome user data — contains bookmarks, history, saved passwords"

# ============================================================================
# 3. iOS BACKUPS (Caution)
# Must come before ~/Library/Application Support/* catch-all.
# ============================================================================

[[rules]]
pattern = "~/Library/Application Support/MobileSync/Backup/*"
category = "AppData"
safety = "Caution"
reason = "iOS device backup — may be the only copy of phone data"

