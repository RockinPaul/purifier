name: Improvement request
description: Suggest a UX improvement, small feature, or polish idea.
title: "[Idea]: "
labels:
  - enhancement
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the idea in one or two sentences.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Optional, but helpful.
  - type: textarea
    id: direction
    attributes:
      label: Possible direction
      description: Optional. A rough suggestion is enough.
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Screenshots, mockups, sanitized paths, or related issues.
