name: Bug report
description: Report incorrect behavior, regressions, crashes, or deletion-safety problems.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem in one or two sentences.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: What were you doing?
      description: Reproduction steps help, but a rough flow is fine too.
      placeholder: |
        1. Run `purifier ~/Library`
        2. Open settings with `,`
        3. ...
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
  - type: dropdown
    id: llm_mode
    attributes:
      label: Classification mode
      options:
        - Rules only
        - LLM enabled
        - Not sure
  - type: textarea
    id: verification
    attributes:
      label: Extra context
      description: Add screenshots, logs, sanitized paths, macOS version, or whether deletion was involved if helpful.
